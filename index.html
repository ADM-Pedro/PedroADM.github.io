<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário do DK</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(180deg,#0b1f38,#07111f);
  color:white;
}

.container {
  max-width:500px;
  margin:auto;
  padding:20px;
}

.hero {
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border-radius:20px;
  padding:25px;
  text-align:center;
}

.hero h1 {
  font-family:Anton;
  font-size:36px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.rule {
  margin:6px 0;
}

.green {color:#22c55e;}
.yellow {color:#facc15;}

input {
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.vagas {
  text-align:center;
}

.bar {
  height:12px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background:linear-gradient(90deg,#facc15,#22c55e);
}

.player {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
  <h1>💰 Diário do DK</h1>
  <p>Ganhe dinheiro jogando Brawl Stars</p>
</div>

<div class="card">
  <h3>📜 Regras</h3>
  <div class="rule">💵 Entrada: <span class="green">R$5</span></div>
  <div class="rule">⚔️ Kill: <span class="green">+R$3</span></div>
  <div class="rule">🏆 Vitória: <span class="green">+R$10</span></div>
</div>

<div class="card vagas">
  <h3>🚨 Vagas</h3>
  <p><span id="ocupadas"></span>/9 preenchidas</p>
  <p>Restam <span id="restantes" class="yellow"></span> vagas</p>

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>
</div>

<div class="card">
  <h3>📝 Entrar</h3>

  <form onsubmit="enviar(event)">
    <input type="text" placeholder="Seu nome" required>
    <input type="tel" placeholder="Telefone" required>
    <input type="text" placeholder="Nick do Brawl" required>

    <button type="submit">🚀 Quero entrar</button>
  </form>

  <p id="msg" style="margin-top:10px;"></p>
</div>

<div class="card">
  <h3>🏅 Ranking</h3>

  <div class="player"><span>🥇 DKShadow</span><span>31 kills</span></div>
  <div class="player"><span>🥈 Brabo777</span><span>24 kills</span></div>
  <div class="player"><span>🥉 LoboBS</span><span>20 kills</span></div>
  <div class="player"><span>NinjaPro</span><span>18 kills</span></div>
  <div class="player"><span>MitoBR</span><span>15 kills</span></div>

</div>

</div>

<script>
let total = 9;
let ocupadas = 7;

document.getElementById("ocupadas").innerText = ocupadas;
document.getElementById("restantes").innerText = total - ocupadas;

document.getElementById("fill").style.width = (ocupadas/total*100) + "%";

function enviar(e){
  e.preventDefault();

  document.getElementById("msg").innerHTML = `
  ✅ Cadastro enviado!<br><br>
  Faça o Pix de <b>R$5,00</b><br><br>
  Chave Pix: <b>11998385244</b><br><br>
  Envie o comprovante com:<br>
  Nome + Nick<br><br>
  ⚠️ Vaga só após pagamento
  `;
}
</script>

</body>
</html>
