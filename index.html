<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário do DK</title>

<style>
body{
  font-family:Arial;
  background:#0b1f38;
  color:white;
  text-align:center;
  padding:20px;
}
.card{
  background:#111827;
  padding:15px;
  border-radius:10px;
  margin:10px;
}
button{
  padding:15px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-size:16px;
}
</style>
</head>

<body>

<h1>💰 Diário do DK</h1>
<p>Ganhe dinheiro jogando Brawl Stars</p>

<div class="card">
💵 Entrada: R$5<br>
⚔️ Kill: +R$3<br>
🏆 Vitória: +R$10
</div>

<div class="card">
👥 7/9 vagas preenchidas<br>
⚠️ Restam 2 vagas
</div>

<div class="card">
<form onsubmit="enviar(event)">
<input placeholder="Nome" required><br><br>
<input placeholder="Telefone" required><br><br>
<input placeholder="Nick" required><br><br>

<button>Entrar</button>
</form>

<p id="msg"></p>
</div>

<script>
function enviar(e){
e.preventDefault();
document.getElementById("msg").innerHTML = `
Cadastro enviado!<br><br>
Faça o Pix de R$5<br><br>
Chave: SUA_CHAVE_PIX<br><br>
Envie comprovante com nome e nick
`;
}
</script>

</body>
</html>
