<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diário do DK</title>

<style>
body{
font-family:Arial;
background:#0b1f38;
color:white;
text-align:center;
padding:20px;
}
.card{
background:#111827;
padding:15px;
border-radius:10px;
margin:10px;
}
button{
padding:15px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:16px;
}
</style>
</head>

<body>

<h1>💰 Diário do DK</h1>
<p>Ganhe dinheiro jogando Brawl Stars</p>

<div class="card">
💵 Entrada: R$5<br>
⚔️ Kill: +R$3<br>
🏆 Vitória: +R$10
</div>

<div class="card">
👥 <span id="ocupadas">0</span>/9 vagas<br>
⚠️ Restam <span id="restantes">9</span>
</div>

<div class="card">

<form onsubmit="enviar(event)">
<input id="nome" placeholder="Nome" required><br><br>
<input id="tel" placeholder="Telefone" required><br><br>
<input id="nick" placeholder="Nick" required><br><br>

<button>Entrar</button>
</form>

<p id="msg"></p>

</div>

<div class="card">
<h3>👥 Players na sala</h3>
<ul id="lista"></ul>
</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwzyjwFh00Vq8igMeEd7rSuG7imTSsK5vFQUY-f8gcdb4qhAHw6PW_r47BzGKMBFODh/exec";

function enviar(e){
e.preventDefault();

fetch(URL,{
method:"POST",
body: JSON.stringify({
nome: document.getElementById("nome").value,
telefone: document.getElementById("tel").value,
nick: document.getElementById("nick").value
})
});

document.getElementById("msg").innerHTML =
"Cadastro enviado! Faça o Pix de R$5 e envie comprovante.";

carregar();
}

function carregar(){
fetch(URL)
.then(r=>r.json())
.then(data=>{

let lista = document.getElementById("lista");
lista.innerHTML="";

data.forEach(nick=>{
let li=document.createElement("li");
li.innerText=nick;
lista.appendChild(li);
});

let total=9;
let ocupadas=data.length;

document.getElementById("ocupadas").innerText=ocupadas;
document.getElementById("restantes").innerText=total-ocupadas;

});
}

carregar();

</script>

</body>
</html>
